<!DOCTYPE html>
<html>
<head>
    <title>AI Student Impact Prediction</title>
</head>
<body>

    <h1>Student Burnout Prediction</h1>

    <form action="/predict" method="post">

        <label>Study Hours:</label>
        <input type="number" step="0.1" name="study_hours" required><br><br>

        <label>Stress Level:</label>
        <input type="number" step="0.1" name="stress_level" required><br><br>

        <label>Sleep Hours:</label>
        <input type="number" step="0.1" name="sleep_hours" required><br><br>

        <label>Screen Time:</label>
        <input type="number" step="0.1" name="screen_time" required><br><br>

        <label>Select Model:</label>
        <select name="model">
            <option value="knn">KNN</option>
            <option value="ann">ANN</option>
            <option value="cnn">CNN</option>
        </select>

        <br><br>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
